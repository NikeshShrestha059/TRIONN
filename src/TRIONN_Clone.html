  <!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TRIONN Clone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="TRIONN_Clone.css">
  </head>
  <body>

      <div id="smoke-container"></div>
     <div class="tr__cursor" id="cursor"></div>
  
      <header class="fixed top-0 left-0 w-full z-50 px-0 py-0">
          <div class="flex items-center justify-between px-20 py-7">
              <div>
                  <img src="img/logo.svg" pd>
              </div>
              <div class="hidden md:flex items-center gap-2">

                  <div class="w-7 h-7 rounded-full glass flex items-center justify-center text-lg text-gray-300">
                  ☀
                  </div>

                  <div class="w-7 h-7 rounded-full glass flex items-center justify-center text-lg text-gray-300">
                  ≡
                  </div>
              </div>

              <div class="flex items-center gap-1">
                      <span class="uppercase text-l tracking-wide text-[Outfit,sans-serif]">
                      Menu
                      </span>

                      <div class="w-9 h-9 glass rounded-full bg-[#1A1A1C] flex flex-col justify-center items-end gap-1 pr-2">
                          <div class="w-5 h-[2px] bg-white rounded-full"></div>
                          <div class="w-4 h-[2px] bg-white rounded-full"></div>
                      </div>
              </div>
          </div>
      </header>

   
      <main class="h-screen text-[110px] flex flex-col items-center justify-center text-center relative px-0">
          <h1 class="roar-heading select-none leading-[0.8]">
              Roar in the<br>
              Digital Wilderness.
          </h1> 
          <p class="max-w-xl text-[11px] uppercase tracking-[0.1em] mt-3 mb-10">
              We roar with success, delivering the TRIONN<br>
              through versatile design, branding and the latest<br>
              tech development to companies.
          </p>
      </main>

  
    <footer class="fixed bottom-12 w-full px-16 flex justify-between items-center z-50">

      <div class="footer-btn-wrap">
        <button class="btn-cyan hover-trigger">
          Explore work
        </button>
      </div>

      <div class="w-40 h-20 rounded-full overflow-hidden">
        <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f"
            class="w-full h-full object-cover">
      </div>

      <div class="footer-btn-wrap">
        <button class="btn-cyan hover-trigger">
          Get in touch
        </button>
      </div>

    </footer>
    <script src="TRIONN_Clone.js"></script>
  </body>
</html>
