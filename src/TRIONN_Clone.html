  <!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TRIONN Clone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
   <style>
          *{
            margin:0;
            padding:0;
            box-sizing:border-box;
          }

          body{
            min-height:100vh;
            background:#050505;
            color:white;
            font-family:'Outfit',sans-serif;
            overflow:hidden;
            cursor:none;
          }


          .glass{
            background:linear-gradient(135deg,rgba(255,255,255,0.15),rgba(255,255,255,0.05));
            backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.18);
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
          }

          .tr__cursor{
            position:fixed;
            top:0;
            left:0;
            width:20px;
            height:20px;
            background:white;
            border-radius:50%;
            pointer-events:none;
            z-index:9999;
            transform:translate(-50%,-50%);
            transition:width .25s ease,height .25s ease,background .25s ease,box-shadow .25s ease;
          }

        
          .elem{
            position:absolute;
            width:15px;
            height:15px;
            background:radial-gradient(circle,rgba(112,135,135,0.4) 19%,rgba(0,0,0,0) 70%);
            border-radius:100%;
            pointer-events:none;
            animation:smoke-drift 1s ease-out forwards;
          }

          @keyframes smoke-drift{
            0%{
              transform:translate(-10%,-10%) scale(4) rotate(180deg);
              opacity:1;
              filter:blur(0px);
            }
            100%{
              transform:translate(var(--x),var(--y)) scale(12) rotate(var(--r));
              opacity:0;
              filter:blur(5px);
            }
          }

          .footer-btn-wrap{
            width:170px;
            height:130px;
            display:flex;
            align-items:center;
            justify-content:center;
          }

          .btn-cyan{
            width:150px;          
            height:50px;          
            border:2px solid #a5f3fc;
            border-radius:9999px;

            display:flex;
            align-items:center;
            justify-content:center;

            transition:.35s ease;
            overflow:hidden;

            color:#a5f3fc;
            font-size:12px;
            font-weight:700;
          }

          .btn-cyan:hover{
            width:110px;
            height:110px;
            border-radius:50%;
            background:rgba(165,243,252,0.12);
            filter:blur(3px);
            box-shadow:
              0 0 20px rgba(165,243,252,0.35),
              0 0 50px rgba(165,243,252,0.15);
            color:transparent;
          }
  </style>
  </head>
  <body>

      <div id="smoke-container"></div>
     <div class="tr__cursor" id="cursor"></div>
  
      <header class="fixed top-0 left-0 w-full z-50 px-0 py-0">
          <div class="flex items-center justify-between px-20 py-7">
              <div>
                  <img src="img/logo.svg" pd>
              </div>
              <div class="hidden md:flex items-center gap-2">

                  <div class="w-7 h-7 rounded-full glass flex items-center justify-center text-lg text-gray-300">
                  ☀
                  </div>

                  <div class="w-7 h-7 rounded-full glass flex items-center justify-center text-lg text-gray-300">
                  ≡
                  </div>
              </div>

              <div class="flex items-center gap-1">
                      <span class="uppercase text-l tracking-wide text-[Outfit,sans-serif]">
                      Menu
                      </span>

                      <div class="w-9 h-9 glass rounded-full bg-[#1A1A1C] flex flex-col justify-center items-end gap-1 pr-2">
                          <div class="w-5 h-[2px] bg-white rounded-full"></div>
                          <div class="w-4 h-[2px] bg-white rounded-full"></div>
                      </div>
              </div>
          </div>
      </header>

   
      <main class="h-screen text-[110px] flex flex-col items-center justify-center text-center relative px-0">
          <h1 class="roar-heading select-none leading-[0.8]">
              Roar in the<br>
              Digital Wilderness.
          </h1> 
          <p class="max-w-xl text-[11px] uppercase tracking-[0.1em] mt-3 mb-10">
              We roar with success, delivering the TRIONN<br>
              through versatile design, branding and the latest<br>
              tech development to companies.
          </p>
      </main>

  
    <footer class="fixed bottom-12 w-full px-16 flex justify-between items-center z-50">

      <div class="footer-btn-wrap">
        <button class="btn-cyan hover-trigger">
          Explore work
        </button>
      </div>

      <div class="w-40 h-20 rounded-full overflow-hidden">
        <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f"
            class="w-full h-full object-cover">
      </div>

      <div class="footer-btn-wrap">
        <button class="btn-cyan hover-trigger">
          Get in touch
        </button>
      </div>

    </footer>

    <script>

      const cursor = document.getElementById("cursor");
      const smokeContainer = document.getElementById("smoke-container");
      const triggers = document.querySelectorAll(".hover-trigger");

      let mouseX=0, mouseY=0;
      let curX=0, curY=0;

      /* CURSOR + SMOKE */
      document.addEventListener("mousemove",(e)=>{
        mouseX=e.clientX;
        mouseY=e.clientY;

        createSmoke(mouseX,mouseY);
      });

      function animate(){
        curX += (mouseX-curX)*0.12;
        curY += (mouseY-curY)*0.12;

        cursor.style.left=curX+"px";
        cursor.style.top=curY+"px";

        requestAnimationFrame(animate);
      }
      animate();

      function createSmoke(x,y){
        const smoke=document.createElement("div");
        smoke.classList.add("elem");

        smoke.style.left=x+"px";
        smoke.style.top=y+"px";

        smoke.style.setProperty("--x",(Math.random()-0.5)*300+"px");
        smoke.style.setProperty("--y",(Math.random()-0.5)*300+"px");
        smoke.style.setProperty("--r",Math.random()*360+"deg");

        smokeContainer.appendChild(smoke);
        smoke.addEventListener("animationend",()=>smoke.remove());
      }

      triggers.forEach(btn=>{
        btn.addEventListener("mouseenter",()=>{
          cursor.style.width="60px";
          cursor.style.height="60px";
          cursor.style.background="rgba(165,243,252,0.15)";
          cursor.style.boxShadow="0 0 20px rgba(165,243,252,0.4)";
        });

        btn.addEventListener("mouseleave",()=>{
          cursor.style.width="20px";
          cursor.style.height="20px";
          cursor.style.background="white";
          cursor.style.boxShadow="none";
        });
      });
    </script>
  </body>
</html>
